<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDD · Energy Decision Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #151820;
    --surface2: #1e2230;
    --border: #2a2f3f;
    --text: #e2e8f0;
    --text-dim: #6b7280;
    --text-muted: #3f4658;
    --accent-solar: #f0a500;
    --accent-price: #3b9eff;
    --green-hi: #22c55e;
    --green-lo: #166534;
    --red-hi: #ef4444;
    --red-lo: #7f1d1d;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 48px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .logo-main {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.12em;
  }
  .logo-sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-hi);
    box-shadow: 0 0 6px var(--green-hi);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .last-update {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  /* ── Action Banner (today's recommendation) ── */
  .action-banner {
    margin: 20px 24px;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .action-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
  }
  .action-content { flex: 1; min-width: 200px; }
  .action-title {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: var(--mono);
    margin-bottom: 4px;
  }
  .action-text {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .action-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .chip {
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .chip.solar { border-color: var(--accent-solar); color: var(--accent-solar); }
  .chip.price { border-color: var(--accent-price); color: var(--accent-price); }
  .chip.good { border-color: var(--green-hi); color: var(--green-hi); }
  .chip.bad { border-color: var(--red-hi); color: var(--red-hi); }

  /* ── Section headers ── */
  .section-header {
    padding: 8px 24px 12px;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Week grid ── */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    padding: 0 24px;
  }
  @media (max-width: 900px) {
    .week-grid {
      grid-template-columns: 1fr 1fr;
    }
  }
  @media (max-width: 500px) {
    .week-grid {
      grid-template-columns: 1fr;
    }
  }

  .day-tile {
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }
  .day-tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .day-tile.today, .day-tile.tomorrow {
    grid-column: span 1;
  }
  /* Today and tomorrow get extended detail in a separate row */

  .tile-header {
    padding: 10px 12px 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .tile-weekday {
    font-family: var(--mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5);
  }
  .tile-date {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin-top: 2px;
    line-height: 1;
  }
  .tile-badge {
    font-family: var(--mono);
    font-size: 0.55rem;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .tile-solar-bar {
    margin: 0 12px 8px;
  }
  .solar-bar-track {
    height: 4px;
    background: rgba(0,0,0,0.3);
    border-radius: 2px;
    overflow: hidden;
  }
  .solar-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: rgba(255,255,255,0.7);
    transition: width 0.8s ease;
  }

  .tile-kwh {
    padding: 0 12px 10px;
    display: flex;
    align-items: baseline;
    gap: 3px;
  }
  .kwh-value {
    font-family: var(--mono);
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
  }
  .kwh-unit {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: rgba(255,255,255,0.6);
  }

  .tile-condition {
    padding: 0 12px 12px;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.65);
  }

  /* ── Detail panels (today + tomorrow) ── */
  .detail-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 24px;
    margin-top: 8px;
  }
  @media (max-width: 700px) {
    .detail-row { grid-template-columns: 1fr; }
  }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .detail-panel-title {
    font-family: var(--mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .detail-panel-title span {
    font-size: 0.85rem;
  }

  /* ── Hourly chart ── */
  .hourly-chart {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 60px;
    margin-bottom: 8px;
  }
  .h-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    height: 100%;
    position: relative;
  }
  .h-bar {
    width: 100%;
    border-radius: 2px 2px 0 0;
    transition: opacity 0.2s;
    min-height: 2px;
    position: absolute;
    bottom: 0;
  }
  .h-bar-wrap.best-window .h-bar {
    outline: 1px solid rgba(255,255,255,0.5);
    outline-offset: 1px;
  }
  .h-bar-wrap.best-window::after {
    content: '★';
    position: absolute;
    top: -14px;
    font-size: 0.6rem;
    color: var(--green-hi);
  }
  .h-label {
    position: absolute;
    bottom: -16px;
    font-family: var(--mono);
    font-size: 0.5rem;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .chart-labels {
    height: 16px;
    position: relative;
    margin-bottom: 4px;
  }

  .chart-legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    color: var(--text-dim);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 1px;
  }

  /* Best buy window highlight */
  .best-buy-info {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.2);
    border-radius: 8px;
  }
  .best-buy-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--green-hi);
    margin-bottom: 3px;
  }
  .best-buy-time {
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
  }
  .best-buy-price {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── Loading / Error ── */
  .loading-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-solar);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    text-align: center;
  }

  .error-box {
    margin: 8px 0;
    padding: 8px 10px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: #ef4444;
  }
  .info-box {
    padding: 8px 10px;
    background: rgba(59,158,255,0.08);
    border: 1px solid rgba(59,158,255,0.2);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--accent-price);
    margin: 4px 0;
  }

  /* ── Price scale indicator ── */
  .price-scale {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--text-muted);
    margin-top: 20px;
  }

  /* ── No prices fallback ── */
  .no-prices-note {
    padding: 16px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px dashed var(--border);
    font-size: 0.75rem;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .no-prices-note code {
    font-family: var(--mono);
    font-size: 0.65rem;
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent-price);
  }
  .config-url {
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-muted);
  }
  .config-url input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.6rem;
    width: 100%;
    margin-top: 4px;
  }
  .config-url button {
    margin-top: 6px;
    background: var(--accent-price);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 0.6rem;
    cursor: pointer;
    font-weight: 700;
  }

  /* ── Dual axis mini chart ── */
  .dual-chart {
    position: relative;
    height: 80px;
    display: flex;
    align-items: flex-end;
    gap: 1px;
    margin-bottom: 20px;
  }
  .dc-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    height: 100%;
    position: relative;
  }
  .dc-solar {
    width: 100%;
    background: rgba(240, 165, 0, 0.45);
    border-radius: 1px 1px 0 0;
    position: absolute;
    bottom: 0;
    transition: height 0.6s ease;
  }
  .dc-price {
    width: 60%;
    position: absolute;
    bottom: 0;
    border-radius: 1px 1px 0 0;
    transition: height 0.6s ease;
    z-index: 2;
  }
  .dc-col.best-hour .dc-price {
    outline: 1px solid var(--green-hi);
  }
  .dc-hour-label {
    position: absolute;
    bottom: -16px;
    font-family: var(--mono);
    font-size: 0.5rem;
    color: var(--text-muted);
    white-space: nowrap;
    transform: translateX(-50%);
    left: 50%;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">⚡ EDD</span>
    <span class="logo-sub">Energy Decision Dashboard</span>
  </div>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span class="last-update" id="lastUpdate">Laden...</span>
  </div>
</header>

<div id="app">
  <div class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Solar forecast ophalen...<br>Elektriciteitsprijzen ophalen...</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURATIE
// ═══════════════════════════════════════════════════════════════
const CONFIG = {
  // Open-Meteo solar forecast (gratis, geen API key nodig)
  lat: 51.2093,
  lng: 3.2247,
  timezone: 'Europe/Brussels',
  
  // Uw PV systeem
  panelKwp: 9.44,
  performanceRatio: 0.78, // incl. inverter, kabel, etc.
  tiltFactor: 1.12,       // correctie hellingshoek vs horizontaal

  // Luminus prijzen JSON URL (van uw machinery repo)
  // Pas aan naar de juiste bestandsnaam in uw GitHub Pages
  pricesUrl: 'https://dsoubry.github.io/machinery/prices.json',
  
  // Fallback: ook de ENTSO-E/Elia day-ahead prijzen proberen
  entsoeFallback: true,
};

// ═══════════════════════════════════════════════════════════════
// DATA OPHALEN
// ═══════════════════════════════════════════════════════════════
async function fetchSolarForecast() {
  const url = `https://api.open-meteo.com/v1/forecast?` +
    `latitude=${CONFIG.lat}&longitude=${CONFIG.lng}` +
    `&hourly=shortwave_radiation,cloudcover,precipitation_probability` +
    `&daily=sunrise,sunset,weathercode` +
    `&forecast_days=7` +
    `&timezone=${encodeURIComponent(CONFIG.timezone)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Open-Meteo API fout');
  return r.json();
}

async function fetchPrices() {
  // Probeer meerdere mogelijke bestandsnamen in machinery repo
  const candidates = [
    CONFIG.pricesUrl,
    'https://dsoubry.github.io/machinery/luminus_prices.json',
    'https://dsoubry.github.io/machinery/data.json',
    'https://dsoubry.github.io/machinery/electricity_prices.json',
  ];
  
  for (const url of candidates) {
    try {
      const r = await fetch(url);
      if (r.ok) {
        const data = await r.json();
        return { data, url };
      }
    } catch(e) { /* try next */ }
  }
  return null;
}

// Normaliseer prijsdata naar {date: "2025-02-23", hour: 14, price: 0.0834, total: 0.21}
function normalizePrices(raw) {
  if (!raw) return [];
  
  // Detecteer formaat: array of objects met datetime/price
  if (Array.isArray(raw)) {
    return raw.map(item => {
      // Probeer diverse veldnamen
      const dt = item.datetime || item.timestamp || item.date || item.time;
      const price = item.price || item.market_price || item.epex || item.value || 0;
      const total = item.total || item.all_in || item.total_price || null;
      
      if (!dt) return null;
      const d = new Date(dt);
      return {
        date: d.toISOString().slice(0, 10),
        hour: d.getHours(),
        price: parseFloat(price),
        total: total ? parseFloat(total) : null,
        raw: item
      };
    }).filter(Boolean);
  }
  
  // Object met datum-keys
  if (typeof raw === 'object' && !Array.isArray(raw)) {
    const result = [];
    for (const [key, val] of Object.entries(raw)) {
      if (typeof val === 'object' && !Array.isArray(val)) {
        // {date: {hour: price}} of {date: [{hour, price}]}
        const d = new Date(key);
        if (!isNaN(d)) {
          for (const [h, p] of Object.entries(val)) {
            result.push({
              date: key.slice(0, 10),
              hour: parseInt(h),
              price: parseFloat(p),
              total: null
            });
          }
        }
      }
    }
    return result;
  }
  return [];
}

// ═══════════════════════════════════════════════════════════════
// BEREKENINGEN
// ═══════════════════════════════════════════════════════════════
function calcDailySolar(solarData) {
  // shortwave_radiation in W/m², hourly
  // Dagproductie = som(W/m² * 1h) / 1000 * kWp * PR * tiltFactor / 1 (bij ideale inst. 1000 W/m²)
  const { hourly } = solarData;
  const times = hourly.time;
  const rad = hourly.shortwave_radiation;
  const cloud = hourly.cloudcover;
  
  const byDate = {};
  times.forEach((t, i) => {
    const date = t.slice(0, 10);
    if (!byDate[date]) byDate[date] = { radSum: 0, hours: [], cloud: [] };
    byDate[date].radSum += rad[i];
    byDate[date].hours.push({ hour: parseInt(t.slice(11, 13)), rad: rad[i], cloud: cloud[i] });
  });
  
  return Object.entries(byDate).map(([date, d]) => {
    // kWh = Wh/m² / 1000 * kWp * PR * tiltFactor
    const kwhEst = (d.radSum / 1000) * CONFIG.panelKwp * CONFIG.performanceRatio * CONFIG.tiltFactor;
    const avgCloud = d.hours.reduce((s, h) => s + h.cloud, 0) / d.hours.length;
    return { date, kwhEst: Math.round(kwhEst * 10) / 10, hours: d.hours, avgCloud, radSum: d.radSum };
  });
}

function solarToColor(kwhEst, maxKwh) {
  // 0 = rood, maxKwh = groen
  const t = Math.min(1, Math.max(0, kwhEst / maxKwh));
  
  // Rood → Oranje → Geel → Groen
  if (t < 0.33) {
    const tt = t / 0.33;
    const r = Math.round(180 + tt * (200 - 180));
    const g = Math.round(30 + tt * (100 - 30));
    const b = 20;
    return `rgb(${r},${g},${b})`;
  } else if (t < 0.66) {
    const tt = (t - 0.33) / 0.33;
    const r = Math.round(200 - tt * (200 - 180));
    const g = Math.round(100 + tt * (160 - 100));
    const b = 20;
    return `rgb(${r},${g},${b})`;
  } else {
    const tt = (t - 0.66) / 0.34;
    const r = Math.round(180 - tt * (180 - 20));
    const g = Math.round(160 + tt * (195 - 160));
    const b = Math.round(20 + tt * (80 - 20));
    return `rgb(${r},${g},${b})`;
  }
}

function darkenColor(color, amount = 0.5) {
  // Maak een donkerdere versie voor achtergrond
  const m = color.match(/rgb\((\d+),(\d+),(\d+)\)/);
  if (!m) return '#1a1a2e';
  const r = Math.round(parseInt(m[1]) * amount);
  const g = Math.round(parseInt(m[2]) * amount);
  const b = Math.round(parseInt(m[3]) * amount);
  return `rgb(${r},${g},${b})`;
}

function findBestBuyWindow(prices, date, windowHours = 3) {
  const dayPrices = prices.filter(p => p.date === date).sort((a, b) => a.hour - b.hour);
  if (dayPrices.length < windowHours) return null;
  
  // Zoek goedkoopste aaneengesloten periode
  let bestStart = 0, bestSum = Infinity;
  for (let i = 0; i <= dayPrices.length - windowHours; i++) {
    const sum = dayPrices.slice(i, i + windowHours).reduce((s, p) => s + p.price, 0);
    if (sum < bestSum) { bestSum = sum; bestStart = i; }
  }
  const window = dayPrices.slice(bestStart, bestStart + windowHours);
  return {
    startHour: window[0].hour,
    endHour: window[windowHours - 1].hour + 1,
    avgPrice: bestSum / windowHours,
    hours: window
  };
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
const WEEKDAYS = ['Zo', 'Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za'];
const MONTHS = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return { wd: WEEKDAYS[d.getDay()], day: d.getDate(), month: MONTHS[d.getMonth()] };
}

function getConditionText(kwhEst, avgCloud) {
  if (kwhEst >= 30) return '☀️ Uitstekend';
  if (kwhEst >= 20) return '🌤️ Goed';
  if (kwhEst >= 12) return '⛅ Matig';
  if (kwhEst >= 5)  return '🌥️ Bewolkt';
  return '☁️ Slecht';
}

function renderHourlyDualChart(dayData, dayPrices, bestWindow, showLabels = true) {
  // Alle uren 6-22 weergeven
  const hours = [];
  for (let h = 6; h <= 22; h++) hours.push(h);
  
  const maxRad = Math.max(...dayData.hours.map(h => h.rad), 1);
  const maxPrice = dayPrices.length > 0 ? Math.max(...dayPrices.map(p => Math.abs(p.price)), 0.001) : 0;
  const minPrice = dayPrices.length > 0 ? Math.min(...dayPrices.map(p => p.price)) : 0;
  const priceRange = maxPrice - Math.min(minPrice, 0);
  
  const bestHours = bestWindow ? bestWindow.hours.map(h => h.hour) : [];
  
  let html = '<div class="dual-chart">';
  hours.forEach(h => {
    const solarHour = dayData.hours.find(d => d.hour === h);
    const priceHour = dayPrices.find(p => p.hour === h);
    const isBest = bestHours.includes(h);
    
    const solarPct = solarHour ? (solarHour.rad / maxRad) * 100 : 0;
    let pricePct = 0, priceColor = '#3b9eff';
    
    if (priceHour && priceRange > 0) {
      pricePct = Math.max(5, ((priceHour.price - Math.min(minPrice, 0)) / priceRange) * 100);
      // Groen=goedkoop, rood=duur
      const t = (priceHour.price - minPrice) / (maxPrice - minPrice);
      const r = Math.round(34 + t * (239 - 34));
      const g = Math.round(197 - t * (197 - 68));
      priceColor = `rgb(${r},${g},80)`;
    }
    
    const showLabel = (h % 3 === 0);
    html += `<div class="dc-col ${isBest ? 'best-hour' : ''}" title="${h}:00${priceHour ? ` — €${priceHour.price.toFixed(4)}/kWh` : ''}${solarHour ? ` | ${Math.round(solarHour.rad)}W/m²` : ''}">
      <div class="dc-solar" style="height:${solarPct}%"></div>
      ${priceHour ? `<div class="dc-price" style="height:${pricePct}%;background:${priceColor};opacity:0.9"></div>` : ''}
      ${showLabel && showLabels ? `<div class="dc-hour-label">${h}</div>` : ''}
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderDetailPanel(label, dayData, dayPrices, bestWindow) {
  const hasPrices = dayPrices.length > 0;
  let html = `<div class="detail-panel">
    <div class="detail-panel-title"><span>📊</span> ${label} — detail</div>`;
  
  html += renderHourlyDualChart(dayData, dayPrices, bestWindow, true);
  
  html += `<div class="chart-legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(240,165,0,0.5)"></div>Zonne-opbrengst</div>`;
  if (hasPrices) {
    html += `<div class="legend-item"><div class="legend-dot" style="background:linear-gradient(to right,#22c55e,#ef4444)"></div>Aankoopprijs</div>`;
  }
  html += `</div>`;
  
  if (bestWindow && hasPrices) {
    html += `<div class="best-buy-info">
      <div class="best-buy-label">⭐ Beste aankoopmoment (${bestWindow.hours.length}u)</div>
      <div class="best-buy-time">${String(bestWindow.startHour).padStart(2,'0')}:00 – ${String(bestWindow.endHour).padStart(2,'0')}:00</div>
      <div class="best-buy-price">Gem. €${bestWindow.avgPrice.toFixed(4)}/kWh · Ideaal voor: wasmachine, vaatwasser, laadpaal</div>
    </div>`;
  } else if (!hasPrices) {
    html += `<div class="info-box">💡 Prijsdata niet beschikbaar voor deze dag</div>`;
  }
  
  html += '</div>';
  return html;
}

function renderApp(solarData, pricesResult) {
  const dailySolar = calcDailySolar(solarData);
  const maxKwh = Math.max(...dailySolar.map(d => d.kwhEst), 10);
  
  let prices = [];
  let pricesError = null;
  let pricesUrl = null;
  
  if (pricesResult) {
    prices = normalizePrices(pricesResult.data);
    pricesUrl = pricesResult.url;
  } else {
    pricesError = 'Geen prijsdata gevonden';
  }
  
  const today = new Date().toISOString().slice(0, 10);
  const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0, 10);
  
  const todayData = dailySolar.find(d => d.date === today);
  const tomorrowData = dailySolar.find(d => d.date === tomorrow);
  
  const todayPrices = prices.filter(p => p.date === today);
  const tomorrowPrices = prices.filter(p => p.date === tomorrow);
  
  const bestToday = findBestBuyWindow(prices, today, 3);
  const bestTomorrow = findBestBuyWindow(prices, tomorrow, 3);
  
  // ── Action banner ──
  let actionText = '';
  let actionChips = '';
  
  if (todayData) {
    const cond = getConditionText(todayData.kwhEst, todayData.avgCloud);
    actionText = `Vandaag verwacht: <strong>${todayData.kwhEst} kWh</strong> solar. `;
    actionChips += `<span class="chip solar">☀️ ${todayData.kwhEst} kWh vandaag</span>`;
    
    if (bestToday) {
      actionText += `Beste aankoopmoment: <strong>${String(bestToday.startHour).padStart(2,'0')}:00–${String(bestToday.endHour).padStart(2,'0')}:00</strong> (€${bestToday.avgPrice.toFixed(4)}/kWh).`;
      actionChips += `<span class="chip price">⚡ ${String(bestToday.startHour).padStart(2,'0')}:00–${String(bestToday.endHour).padStart(2,'0')}:00 goedkoopst</span>`;
    } else {
      actionText += `Start grote apparaten wanneer zonne-opbrengst piekt.`;
      actionChips += `<span class="chip">Prijsdata niet beschikbaar</span>`;
    }
    
    if (todayData.kwhEst >= 20) {
      actionChips += `<span class="chip good">Goede zondag ☀️</span>`;
    } else if (todayData.kwhEst < 5) {
      actionChips += `<span class="chip bad">Weinig zon vandaag</span>`;
    }
  }
  
  const nowStr = new Date().toLocaleTimeString('nl-BE', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('lastUpdate').textContent = `update ${nowStr}`;
  
  let html = `
    <div class="action-banner">
      <div class="action-icon">🎯</div>
      <div class="action-content">
        <div class="action-title">Actie vandaag</div>
        <div class="action-text">${actionText || 'Solar data geladen.'}</div>
        <div class="action-chips">${actionChips}</div>
        ${pricesError ? `<div class="error-box" style="margin-top:8px">⚠️ ${pricesError} — stel correcte URL in hieronder</div>` : ''}
        ${pricesUrl ? `<div style="font-family:var(--mono);font-size:0.55rem;color:var(--text-muted);margin-top:4px">📡 Prijzen: ${pricesUrl}</div>` : ''}
      </div>
    </div>`;
  
  // ── Week tiles ──
  html += '<div class="section-header">WEEKOVERZICHT — ZONNEVERWACHTING</div>';
  html += '<div class="week-grid">';
  
  dailySolar.forEach(day => {
    const { wd, dd, month } = { ...formatDate(day.date) };
    const { day: dd2, month: month2 } = formatDate(day.date);
    const isToday = day.date === today;
    const isTomorrow = day.date === tomorrow;
    
    const color = solarToColor(day.kwhEst, maxKwh);
    const darkBg = darkenColor(color, 0.22);
    const pct = Math.min(100, (day.kwhEst / maxKwh) * 100);
    
    let badge = '';
    if (isToday) badge = '<span class="tile-badge">vandaag</span>';
    else if (isTomorrow) badge = '<span class="tile-badge">morgen</span>';
    
    html += `<div class="day-tile ${isToday ? 'today' : ''} ${isTomorrow ? 'tomorrow' : ''}" 
      style="background:linear-gradient(160deg, ${darkBg} 0%, ${darkenColor(color, 0.15)} 100%); border-color:${darkenColor(color, 0.4)}">
      <div class="tile-header">
        <div>
          <div class="tile-weekday">${formatDate(day.date).wd}</div>
          <div class="tile-date">${dd2} ${month2}</div>
        </div>
        ${badge}
      </div>
      <div class="tile-solar-bar">
        <div class="solar-bar-track">
          <div class="solar-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="tile-kwh">
        <span class="kwh-value">${day.kwhEst}</span>
        <span class="kwh-unit">kWh</span>
      </div>
      <div class="tile-condition">${getConditionText(day.kwhEst, day.avgCloud)}</div>
    </div>`;
  });
  
  html += '</div>'; // week-grid
  
  // ── Detail panels today + tomorrow ──
  html += '<div class="section-header" style="margin-top:20px">DETAIL: VANDAAG & MORGEN — PRIJS + ZON</div>';
  html += '<div class="detail-row">';
  
  if (todayData) {
    html += renderDetailPanel('Vandaag', todayData, todayPrices, bestToday);
  }
  if (tomorrowData) {
    html += renderDetailPanel('Morgen', tomorrowData, tomorrowPrices, bestTomorrow);
  }
  
  html += '</div>'; // detail-row
  
  // ── Configuratie sectie (als geen prijzen) ──
  if (!pricesResult) {
    html += `
    <div class="section-header" style="margin-top:20px">CONFIGURATIE PRIJSDATA</div>
    <div style="padding:0 24px">
      <div class="no-prices-note">
        <strong>Elektriciteitsprijzen niet gevonden.</strong><br><br>
        Zorg dat uw <code>machinery</code> repo een JSON bestand publiceert via GitHub Pages.<br>
        Verwacht formaat: array van <code>[{"datetime":"2025-02-23T14:00:00","price":0.0834}, ...]</code><br>
        of <code>[{"datetime":"...","price":0.08,"total":0.21}, ...]</code><br><br>
        Stel de URL hieronder in:
        <div class="config-url">
          Prijzen JSON URL:
          <input type="text" id="customPriceUrl" value="${CONFIG.pricesUrl}" placeholder="https://dsoubry.github.io/machinery/prices.json">
          <button onclick="retryWithUrl()">Opnieuw laden</button>
        </div>
      </div>
    </div>`;
  }
  
  document.getElementById('app').innerHTML = html;
}

function retryWithUrl() {
  const url = document.getElementById('customPriceUrl').value;
  CONFIG.pricesUrl = url;
  init();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  document.getElementById('app').innerHTML = `
    <div class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Solar forecast ophalen via Open-Meteo...<br>Elektriciteitsprijzen laden...</div>
    </div>`;
  
  try {
    const [solarData, pricesResult] = await Promise.all([
      fetchSolarForecast(),
      fetchPrices()
    ]);
    
    renderApp(solarData, pricesResult);
    
  } catch(err) {
    document.getElementById('app').innerHTML = `
      <div class="loading-overlay">
        <div class="error-box" style="font-size:0.8rem;padding:16px">
          ❌ Fout bij laden: ${err.message}
        </div>
      </div>`;
    document.getElementById('statusDot').style.background = '#ef4444';
    document.getElementById('statusDot').style.boxShadow = '0 0 6px #ef4444';
  }
}

// Auto-refresh elke 30 minuten
init();
setInterval(init, 30 * 60 * 1000);
</script>
