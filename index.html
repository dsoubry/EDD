<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>EDD — Energy Decision Dashboard</title>
  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --muted2: rgba(255,255,255,.52);

      --good: #4CAF6A;
      --mid:  #E2B84B;
      --bad:  #E25555;

      --shadow: 0 10px 40px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 22px;
      --pad: 14px;
      --pad2: 18px;

      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
    }

    *{ box-sizing: border-box; }
    html,body{ height: 100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1000px 600px at 20% -10%, rgba(76,175,106,.22), transparent 55%),
        radial-gradient(900px 520px at 110% 10%, rgba(226,184,75,.18), transparent 60%),
        radial-gradient(900px 520px at 30% 120%, rgba(226,85,85,.14), transparent 60%),
        linear-gradient(180deg, #070c16, var(--bg));
      color: var(--text);
    }

    .app{
      max-width: 520px;
      margin: 0 auto;
      padding: calc(10px + var(--safeTop)) 14px calc(14px + var(--safeBottom));
    }

    .topbar{
      position: sticky; top: 0; z-index: 5;
      padding: 10px 0 12px;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(11,18,32,.92), rgba(11,18,32,.65) 75%, transparent);
    }
    .topbar-inner{
      display:flex; align-items:center; justify-content:space-between; gap: 12px;
    }
    .title-wrap{ min-width: 0; }
    .title{ font-size: 18px; font-weight: 760; letter-spacing: .2px; margin:0; line-height: 1.2; }
    .subtitle{ margin: 3px 0 0; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .icon-btn{
      width: 40px; height: 40px; border-radius: 14px;
      border: 1px solid var(--border); background: rgba(255,255,255,.06);
      display:grid; place-items:center; cursor:pointer;
      transition: transform .15s ease, background .15s ease; flex: 0 0 auto;
    }
    .icon-btn:active{ transform: scale(.98); }
    .icon{ width: 18px; height: 18px; opacity:.9; }
    .grab{ width: 44px; height: 5px; border-radius: 999px; background: rgba(255,255,255,.18); margin: 10px auto 0; }

    .stack{ display:flex; flex-direction:column; gap: 12px; padding-bottom: 20px; }

    .card{
      position: relative; border-radius: var(--radius2);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.045));
      box-shadow: 0 12px 36px rgba(0,0,0,.22); overflow:hidden;
    }
    .card::before{
      content:""; position:absolute; left:0; top:0; bottom:0;
      width: 8px; background: var(--bar, var(--mid)); opacity: .95;
    }
    .card.primary{ padding: var(--pad2); border-radius: 24px; }
    .card.primary::before{ width: 10px; }
    .card.compact{ padding: var(--pad); }
    .card.tap{ cursor:pointer; user-select:none; -webkit-tap-highlight-color: transparent; }
    .card.tap:active{ transform: translateY(1px); filter: brightness(1.02); }

    .row{ display:flex; align-items:flex-start; justify-content:space-between; gap: 12px; }
    .left, .right{ min-width: 0; }
    .badge-dot{
      width: 10px; height: 10px; border-radius: 999px; margin-top: 3px;
      background: var(--dot, var(--mid));
      box-shadow: 0 0 0 6px rgba(255,255,255,.06); flex: 0 0 auto;
    }
    .h{ display:flex; align-items:center; gap: 10px; min-width:0; }

    .card-title{ margin:0; font-size: 16px; font-weight: 740; letter-spacing: .2px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub{ margin: 3px 0 0; font-size: 12px; color: var(--muted); }

    .grid2{ margin-top: 14px; display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .kpi{
      border-radius: 16px; border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04); padding: 12px 12px 11px;
    }
    .kpi-label{ display:flex; align-items:center; gap: 8px; color: var(--muted); font-size: 12px; }
    .kpi-value{ margin-top: 6px; font-size: 22px; font-weight: 780; letter-spacing: .2px; line-height: 1.1; }
    .kpi-note{ margin-top: 4px; font-size: 12px; color: var(--muted2); }

    .footer{ margin-top: 14px; display:flex; align-items:center; justify-content:space-between; gap: 10px; flex-wrap: wrap; }

    .chip{
      display:inline-flex; align-items:center; gap: 8px; padding: 8px 10px;
      border-radius: 999px; font-size: 12px; font-weight: 740; letter-spacing: .15px;
      background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.12);
    }
    .chip.good{ background: color-mix(in srgb, var(--good) 30%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--good) 45%, rgba(255,255,255,.12)); }
    .chip.mid { background: color-mix(in srgb, var(--mid)  30%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--mid)  45%, rgba(255,255,255,.12)); }
    .chip.bad { background: color-mix(in srgb, var(--bad)  28%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--bad)  45%, rgba(255,255,255,.12)); }

    .meta{ font-size: 12px; color: var(--muted); white-space: nowrap; }

    .compact-line{ margin-top: 10px; display:flex; align-items:center; justify-content:space-between; gap: 12px; }
    .compact-kwh{ font-size: 14px; font-weight: 760; }
    .compact-time{ font-size: 13px; color: var(--muted); white-space: nowrap; }

    /* Bottom sheet — mobile first */
    .overlay{
      position: fixed; inset: 0; z-index: 20; display:none;
      background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
      padding: 0; align-items: flex-end; justify-content:center;
    }
    .overlay.show{ display:flex; }
    .sheet{
      width: 100%; max-width: 520px;
      border-radius: 26px 26px 0 0;          /* plakt aan onderkant op mobile */
      border: 1px solid rgba(255,255,255,.14); border-bottom: none;
      background: linear-gradient(180deg, rgba(15,22,40,.98), rgba(11,18,32,.96));
      box-shadow: var(--shadow);
      max-height: 92dvh;                      /* nooit groter dan scherm */
      display: flex; flex-direction: column;
    }
    .sheet-head{
      flex-shrink: 0;
      padding: 10px 16px 10px; border-bottom: 1px solid rgba(255,255,255,.10);
      display:flex; align-items:flex-start; justify-content:space-between; gap: 12px;
    }
    .sheet-grab{
      width: 44px; height: 5px; border-radius: 999px;
      background: rgba(255,255,255,.18); margin: 10px auto 0;
    }
    .sheet-title{ margin: 8px 0 0; font-size: 16px; font-weight: 780; line-height: 1.2; }
    .sheet-sub{ margin: 4px 0 0; font-size: 12px; color: var(--muted); }
    .close{
      width: 36px; height: 36px; border-radius: 12px; margin-top: 6px;
      border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06);
      cursor:pointer; flex-shrink:0; display:grid; place-items:center;
    }
    .close:active{ transform: scale(.95); }

    /* Scrollbare body */
    .sheet-body{
      flex: 1; overflow-y: auto; padding: 0 0 calc(16px + var(--safeBottom));
      -webkit-overflow-scrolling: touch;
    }

    /* Legenda */
    .sheet-legend{
      display:flex; gap: 8px; flex-wrap: wrap;
      padding: 10px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sh-pill{
      display:inline-flex; align-items:center; gap: 6px;
      padding: 5px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04); font-size: 11px; color: var(--muted);
    }
    .sw{ width: 8px; height: 8px; border-radius: 999px; }

    /* Uurlijst — mobile first: 1 rij per uur */
    .hour-list{ display:flex; flex-direction:column; }

    .hl-row{
      display: grid;
      grid-template-columns: 52px 1fr 56px;   /* uur | balk | prijs */
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s;
    }
    .hl-row:active{ background: rgba(255,255,255,.04); }
    .hl-row.hl-best{
      background: rgba(76,175,106,.08);
      border-bottom-color: rgba(76,175,106,.15);
    }

    .hl-time{
      font-size: 13px; font-weight: 700; color: var(--text);
      white-space: nowrap;
    }
    .hl-best .hl-time::before{
      content: '⭐ '; font-size: 11px;
    }

    .hl-bar-wrap{
      height: 8px; border-radius: 999px;
      background: rgba(255,255,255,.06); overflow: hidden;
    }
    .hl-bar{
      height: 100%; border-radius: inherit;
      transition: width .4s ease;
    }

    .hl-price{
      font-size: 13px; font-weight: 800;
      text-align: right; white-space: nowrap;
    }
    .hl-price .hl-unit{
      font-size: 10px; font-weight: 500; color: var(--muted2); display:block; margin-top: 1px;
    }

    /* Inline prijspreview in primary card */
    .price-preview{
      margin-top: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      overflow: hidden;
    }
    .pp-header{
      display:flex; align-items:center; justify-content:space-between;
      padding: 8px 12px 6px;
      font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
    }
    .pp-open-btn{
      display:inline-flex; align-items:center; gap: 4px;
      font-size: 11px; font-weight: 700; color: var(--muted);
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px; padding: 3px 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .pp-open-btn:active{ background: rgba(255,255,255,.12); }

    .pp-rows{ display:none; }
    .pp-rows.open{ display:block; }

    .pp-row{
      display: grid;
      grid-template-columns: 44px 1fr 52px;
      align-items: center; gap: 8px;
      padding: 6px 12px;
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .pp-row.pp-best{ background: rgba(76,175,106,.07); }
    .pp-time{ font-size: 12px; font-weight: 700; }
    .pp-bar-wrap{ height: 6px; border-radius: 999px; background: rgba(255,255,255,.06); overflow:hidden; }
    .pp-bar{ height: 100%; border-radius: inherit; }
    .pp-price{ font-size: 12px; font-weight: 800; text-align:right; white-space:nowrap; }

    .muted{ color: var(--muted); }
    .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

    /* Loading & error states */
    .loader{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding: 60px 20px; gap: 16px;
    }
    .spinner{
      width: 32px; height: 32px; border: 2px solid rgba(255,255,255,.15);
      border-top-color: var(--good); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }
    .loader-text{ font-size: 13px; color: var(--muted); text-align:center; line-height: 1.6; }

    .source-note{
      font-size: 11px; color: var(--muted2); margin-top: 6px;
      display:flex; align-items:center; gap: 5px;
    }
    .source-dot{ width: 5px; height: 5px; border-radius: 50%; background: var(--good); flex-shrink:0; }
    .source-dot.warn{ background: var(--mid); }
    .source-dot.err{ background: var(--bad); }



  </style>
</head>

<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="title-wrap">
        <h1 class="title">Energie-overzicht</h1>
        <p class="subtitle" id="subtitle">Laden…</p>
      </div>
      <button class="icon-btn" id="btnSettings" aria-label="Instellingen">
        <svg class="icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="2"/>
          <path d="M19.4 15a8.3 8.3 0 0 0 .1-1l2-1.2-2-3.5-2.3.6a7.7 7.7 0 0 0-.8-.6l-.3-2.3H9.9l-.3 2.3c-.3.2-.6.4-.8.6l-2.3-.6-2 3.5 2 1.2c0 .3 0 .7.1 1a8.3 8.3 0 0 0-.1 1l-2 1.2 2 3.5 2.3-.6c.2.2.5.4.8.6l.3 2.3h4.2l.3-2.3c.3-.2.6-.4.8-.6l2.3.6 2-3.5-2-1.2Z"
                stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="grab" aria-hidden="true"></div>
  </header>

  <main class="stack" id="cards">
    <div class="loader">
      <div class="spinner"></div>
      <div class="loader-text">Solar forecast ophalen…<br>Elektriciteitsprijzen laden…</div>
    </div>
  </main>
</div>

<!-- Bottom sheet -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="sheet">
    <div class="sheet-head">
      <div style="flex:1; min-width:0;">
        <div class="sheet-grab"></div>
        <div class="sheet-title" id="sheetTitle">Details</div>
        <div class="sheet-sub" id="sheetSub">—</div>
      </div>
      <button class="close" id="btnClose" aria-label="Sluiten">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="sheet-legend">
      <span class="sh-pill"><span class="sw" style="background:var(--good)"></span>Goedkoop</span>
      <span class="sh-pill"><span class="sw" style="background:var(--mid)"></span>Gemiddeld</span>
      <span class="sh-pill"><span class="sw" style="background:var(--bad)"></span>Duur</span>
      <span class="sh-pill" id="bestPill">🕒 —</span>
    </div>
    <div class="sheet-body">
      <div class="hour-list" id="hourList"></div>
      <p id="priceSource" style="padding:8px 14px 0;font-size:10px;color:var(--muted2);"></p>
    </div>
  </div>
</div>




<script>
// ════════════════════════════════════════════════════════════
// CONFIGURATIE
// ════════════════════════════════════════════════════════════
const CFG = {
  lat: 51.2093,           // Brugge
  lng: 3.2247,
  tz: 'Europe/Brussels',
  kwp: 9.44,              // Uw PV vermogen
  pr: 0.78,               // Performance Ratio (inverter + kabel + temp)
  tilt: 1.12,             // Correctiefactor hellingshoek
  // Luminus all-in toeslag boven marktprijs (€/kWh) — stel in op basis van uw contract
  luminusToeslag: 0.065,
};




// ════════════════════════════════════════════════════════════
// DATA OPHALEN
// ════════════════════════════════════════════════════════════

async function fetchSolar() {
  const url = `https://api.open-meteo.com/v1/forecast?`
    + `latitude=${CFG.lat}&longitude=${CFG.lng}`
    + `&hourly=shortwave_radiation,cloudcover,direct_radiation`
    + `&daily=sunrise,sunset,weathercode,precipitation_sum`
    + `&forecast_days=7`
    + `&timezone=${encodeURIComponent(CFG.tz)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Open-Meteo fout: ${r.status}`);
  return r.json();
}

// ── Parset de machinery GitHub Pages HTML ────────────────────
// Tabelstructuur per rij: td[0]=uurblok, td[1]=€/MWh, td[2]=ct/kWh, td[3]=balk
// Positie-gebaseerd — vermijdt querySelector-problemen met €-teken in attribuut.
async function fetchMachineryPrices() {
  const MACHINERY_URL = 'https://dsoubry.github.io/machinery/';
  try {
    const r = await fetch(MACHINERY_URL, { cache: 'no-cache' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const html = await r.text();

    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');
    const prices = [];

    // Datum uit tab-label "Ma 23/2" of "Di 24/2"
    function tabDate(tabId) {
      const tab = doc.getElementById(tabId);
      if (!tab) return null;
      const m = tab.textContent.trim().match(/(\d{1,2})\/(\d{1,2})/);
      if (!m) return null;
      const day = m[1].padStart(2, '0'), month = m[2].padStart(2, '0');
      const now = new Date();
      let year  = now.getFullYear();
      if (+month < now.getMonth() + 1) year++;
      return `${year}-${month}-${day}`;
    }

    function parseDay(contentId, date) {
      if (!date) return;
      const block = doc.getElementById(contentId);
      if (!block) return;
      block.querySelectorAll('tbody tr').forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length < 2) return;

        // td[0]: "13.00u – 14.00u"  → beginuur
        const uurMatch = cells[0].textContent.match(/(\d{1,2})[.:]/);
        if (!uurMatch) return;
        const hour = +uurMatch[1];

        // td[1]: "5.31 €" of "112.74 €"  (€/MWh)
        const priceMatch = cells[1].textContent.match(/([\d]+[.,][\d]+)/);
        if (!priceMatch) return;
        const marketEurMwh = parseFloat(priceMatch[1].replace(',', '.'));

        prices.push({
          date,
          hour,
          price: (marketEurMwh / 1000) + CFG.luminusToeslag,
          marketEurMwh,
          isBest: row.classList.contains('best-single-hour'),
        });
      });
    }

    parseDay('content-today',    tabDate('tab-today'));
    parseDay('content-tomorrow', tabDate('tab-tomorrow'));

    if (!prices.length) throw new Error('Geen rijen gevonden — HTML-structuur gewijzigd?');
    return { prices, sourceLabel: 'ENTSO-E via machinery' };

  } catch(e) {
    console.warn('machinery fetch mislukt:', e.message);
    return { error: e.message };   // geef fout mee zodat fallback het kan loggen
  }
}

// ── Elia Open Data — day-ahead BELPEX (fallback) ─────────────
async function fetchEliaPrices() {
  try {
    const now  = new Date();
    const from = new Date(now); from.setHours(0,0,0,0);
    const to   = new Date(now); to.setDate(to.getDate() + 2); to.setHours(23,0,0,0);

    const url = `https://opendata.elia.be/api/explore/v2.1/catalog/datasets/ods031/records`
      + `?limit=100&order_by=datetime%20ASC`
      + `&where=datetime%3E%3D%22${from.toISOString().slice(0,10)}T00%3A00%3A00%2B00%3A00%22`
      + `%20AND%20datetime%3C%3D%22${to.toISOString().slice(0,10)}T23%3A00%3A00%2B00%3A00%22`;

    const r = await fetch(url);
    if (!r.ok) throw new Error(`Elia HTTP ${r.status}`);
    const json = await r.json();
    if (!json.results?.length) throw new Error('Geen Elia-resultaten');

    const prices = json.results.flatMap(rec => {
      const dt = new Date(rec.datetime ?? rec.Datetime);
      if (isNaN(dt)) return [];
      // Elia geeft €/MWh; veld heet "price" of "da_price" afhankelijk van dataset
      const mwh = rec.price ?? rec.da_price ?? rec.qh ?? null;
      if (mwh === null) return [];
      return [{
        date: localDate(dt),
        hour: dt.toLocaleString('nl-BE', { timeZone: CFG.tz, hour: 'numeric', hour12: false }) | 0,
        price: (mwh / 1000) + CFG.luminusToeslag,
        marketEurMwh: mwh,
        isBest: false,
      }];
    }).filter(p => !isNaN(p.hour));

    if (!prices.length) throw new Error('Geen bruikbare Elia-rijen');
    return { prices, sourceLabel: 'Elia Open Data (day-ahead)' };

  } catch(e) {
    console.warn('Elia fetch mislukt:', e.message);
    return null;
  }
}



// ════════════════════════════════════════════════════════════
// SOLAR BEREKENINGEN
// ════════════════════════════════════════════════════════════
function calcSolar(solarJson) {
  const times = solarJson.hourly.time;
  const rad   = solarJson.hourly.shortwave_radiation;
  const cloud = solarJson.hourly.cloudcover;

  const byDate = {};
  times.forEach((t, i) => {
    const date = t.slice(0, 10);
    if (!byDate[date]) byDate[date] = { radSum: 0, hours: [] };
    byDate[date].radSum += rad[i];
    byDate[date].hours.push({ hour: +t.slice(11,13), rad: rad[i], cloud: cloud[i] });
  });

  return Object.entries(byDate).map(([date, d]) => {
    const kwhEst = (d.radSum / 1000) * CFG.kwp * CFG.pr * CFG.tilt;
    const avgCloud = d.hours.reduce((s, h) => s + h.cloud, 0) / d.hours.length;
    const peakHour = d.hours.reduce((best, h) => h.rad > best.rad ? h : best, { rad: 0, hour: 12 });
    return {
      date,
      kwhEst: Math.round(kwhEst * 10) / 10,
      avgCloud: Math.round(avgCloud),
      hours: d.hours,
      peakHour: peakHour.hour,
    };
  });
}

function solarScore(kwhEst) {
  if (kwhEst >= 22) return 'good';
  if (kwhEst >= 9)  return 'mid';
  return 'bad';
}

function solarLabel(score) {
  return score === 'good' ? 'Uitstekend' : score === 'mid' ? 'Gemiddeld' : 'Zwak';
}

function solarIcon(score) {
  return score === 'good' ? '🟢' : score === 'mid' ? '🟡' : '🔴';
}

// ════════════════════════════════════════════════════════════
// PRIJZEN ANALYSE
// ════════════════════════════════════════════════════════════

// Markeer beste 3-uurs aankoopvenster
function annotateBestWindow(prices, date, windowH = 3) {
  const dayPrices = prices.filter(p => p.date === date).sort((a, b) => a.hour - b.hour);
  if (dayPrices.length < windowH) {
    dayPrices.forEach(p => { p.isBest = false; });
    return null;
  }

  let bestStart = 0, bestSum = Infinity;
  for (let i = 0; i <= dayPrices.length - windowH; i++) {
    const sum = dayPrices.slice(i, i + windowH).reduce((s, p) => s + p.price, 0);
    if (sum < bestSum) { bestSum = sum; bestStart = i; }
  }
  const window = dayPrices.slice(bestStart, bestStart + windowH);
  window.forEach(p => { p.isBest = true; });

  const startH = window[0].hour;
  const endH   = window[windowH - 1].hour + 1;
  const avgP   = bestSum / windowH;

  return {
    label: `${pad(startH)}:00–${pad(endH)}:00`,
    avgPrice: avgP,
    minPrice: Math.min(...dayPrices.map(p => p.price)),
    hours: window,
  };
}

function pad(n) { return String(n).padStart(2, '0'); }

function bestSolarWindow(solarDay) {
  // Uren met >70% van de piekproductie
  const maxRad = Math.max(...solarDay.hours.map(h => h.rad));
  const goodHours = solarDay.hours.filter(h => h.rad >= maxRad * 0.7).map(h => h.hour).sort((a,b)=>a-b);
  if (!goodHours.length) return `${pad(solarDay.peakHour)}:00`;
  return `${pad(goodHours[0])}:00–${pad(goodHours[goodHours.length - 1] + 1)}:00`;
}

// ════════════════════════════════════════════════════════════
// KAARTEN BOUWEN
// ════════════════════════════════════════════════════════════

function buildDayData(solarDays, prices) {
  const now = new Date();
  const todayStr    = localDate(now);
  const tomorrowStr = localDate(new Date(+now + 864e5));
  const weekdays    = ['zo','ma','di','wo','do','vr','za'];
  const months      = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

  return solarDays.map((sd, idx) => {
    const d     = new Date(sd.date + 'T12:00:00');
    const score = solarScore(sd.kwhEst);
    const hasPrices = prices.filter(p => p.date === sd.date).length > 0;

    const bestPrice  = hasPrices ? annotateBestWindow(prices, sd.date, 3) : null;
    const bestSolar  = bestSolarWindow(sd);
    const bestWindow = bestPrice ? bestPrice.label : bestSolar;
    const bestLabel  = bestPrice ? 'Beste netmoment' : 'Beste zonmoment';

    let advice, adviceTone;
    if (score === 'good' && bestPrice && bestPrice.minPrice < 0.08) {
      advice = 'ZON + NET GUNSTIG'; adviceTone = 'good';
    } else if (score === 'good') {
      advice = 'ZON VERBRUIKEN'; adviceTone = 'good';
    } else if (bestPrice && bestPrice.minPrice < 0.08) {
      advice = 'NET VERBRUIKEN'; adviceTone = 'mid';
    } else if (score === 'bad') {
      advice = 'UITSTELLEN'; adviceTone = 'bad';
    } else {
      advice = 'FLEXIBEL'; adviceTone = 'mid';
    }

    const isToday    = sd.date === todayStr;
    const isTomorrow = sd.date === tomorrowStr;
    const label = isToday ? 'Vandaag' : isTomorrow ? 'Morgen'
                : weekdays[d.getDay()].charAt(0).toUpperCase() + weekdays[d.getDay()].slice(1)
                + 'dag'.repeat(+(weekdays[d.getDay()] !== 'za' && weekdays[d.getDay()] !== 'zo'
                    && weekdays[d.getDay()] !== 'di' && weekdays[d.getDay()] !== 'vr'));

    // Betere dagbenamingen
    const labelMap = { ma:'Maandag', di:'Dinsdag', wo:'Woensdag', do:'Donderdag',
                       vr:'Vrijdag', za:'Zaterdag', zo:'Zondag' };
    const dayLabel = isToday ? 'Vandaag' : isTomorrow ? 'Morgen' : labelMap[weekdays[d.getDay()]];
    const dateStr  = `${weekdays[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;

    return {
      key: sd.date,
      label: dayLabel,
      date: dateStr,
      solarKwh: sd.kwhEst,
      score,
      bestWindow,
      bestLabel,
      minPrice: bestPrice?.minPrice ?? null,
      advice: { text: advice, tone: adviceTone },
      tappable: hasPrices,
      prices: prices.filter(p => p.date === sd.date).sort((a,b)=>a.hour-b.hour),
      isPrimary: idx < 2,
    };
  });
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════

function toneColor(t) {
  const s = getComputedStyle(document.documentElement);
  if (t === 'good') return s.getPropertyValue('--good').trim();
  if (t === 'bad')  return s.getPropertyValue('--bad').trim();
  return s.getPropertyValue('--mid').trim();
}

function priceColor(tone) {
  if (tone === 'good') return 'var(--good)';
  if (tone === 'bad')  return 'var(--bad)';
  return 'var(--mid)';
}

function primaryCardHTML(d) {
  const minMwh = d.prices.length ? Math.min(...d.prices.map(p => p.marketEurMwh ?? p.price * 1000)) : null;
  const minPriceLine = minMwh != null
    ? `<span class="meta">min ${minMwh.toFixed(1)} €/MWh</span>`
    : `<span class="meta">${d.bestLabel}</span>`;

  // Inline prijspreview: toon alle uren, gesorteerd goedkoopst eerst, top 5 zichtbaar
  let previewHTML = '';
  if (d.tappable && d.prices.length) {
    // Bereken min/max op basis van ruwe marktprijs (€/MWh)
    const maxP = Math.max(...d.prices.map(p => p.marketEurMwh ?? p.price * 1000));
    const minP = Math.min(...d.prices.map(p => p.marketEurMwh ?? p.price * 1000));
    const range = maxP - minP || 0.001;

    const rows = d.prices.map(p => {
      const mwh     = p.marketEurMwh ?? (p.price * 1000);
      const tone    = priceTone(p.price, d.prices);
      const barPct  = Math.round(((mwh - minP) / range) * 100);
      const isBest  = p.isBest;
      return `<div class="pp-row ${isBest ? 'pp-best' : ''}">
        <div class="pp-time" style="color:${isBest ? 'var(--good)' : 'var(--text)'}">${pad(p.hour)}:00</div>
        <div class="pp-bar-wrap">
          <div class="pp-bar" style="width:${barPct}%;background:${priceColor(tone)}"></div>
        </div>
        <div class="pp-price" style="color:${priceColor(tone)}">
          ${mwh.toFixed(1)} <small style="font-size:9px;opacity:.7">€/MWh</small>
        </div>
      </div>`;
    }).join('');

    previewHTML = `
      <div class="price-preview">
        <div class="pp-header">
          <span>⚡ Day-ahead prijs (€/MWh)</span>
          <button class="pp-open-btn" onclick="event.stopPropagation();togglePrices(this)">
            Alles&nbsp;↓
          </button>
        </div>
        <div class="pp-rows">
          ${rows}
        </div>
      </div>`;
  } else if (!d.tappable) {
    previewHTML = `<div style="margin-top:10px;font-size:12px;color:var(--muted2);padding:8px 0;">
      Geen uurprijzen beschikbaar voor deze dag.
    </div>`;
  }

  return `
    <div class="row">
      <div class="left h">
        <span class="badge-dot" aria-hidden="true"></span>
        <div>
          <p class="card-title">${d.label} <span class="muted" style="font-weight:650;">• ${d.date}</span></p>
        </div>
      </div>
      <div class="right"><span class="chip ${d.advice.tone}">⚡ ${d.advice.text}</span></div>
    </div>
    <div class="grid2">
      <div class="kpi">
        <div class="kpi-label">☀ Verwachte zon</div>
        <div class="kpi-value">${d.solarKwh.toFixed(1)} kWh</div>
        <div class="kpi-note">Dagscore: ${solarLabel(d.score)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">🕒 ${d.bestLabel}</div>
        <div class="kpi-value" style="font-size:${d.bestWindow.length > 12 ? '17px' : '22px'}">${d.bestWindow}</div>
        <div class="kpi-note">Meest gunstige periode</div>
      </div>
    </div>
    ${previewHTML}
    <div class="footer">
      <span class="chip ${d.score}">${solarIcon(d.score)} Zon: ${solarLabel(d.score)}</span>
      ${minPriceLine}
    </div>`;
}

function compactCardHTML(d) {
  return `
    <div class="row">
      <div class="left h">
        <span class="badge-dot" aria-hidden="true"></span>
        <div>
          <p class="card-title">${d.label} <span class="muted" style="font-weight:650;">• ${d.date}</span></p>
          <p class="card-sub">${solarIcon(d.score)} ${solarLabel(d.score)} • ${d.advice.text}</p>
        </div>
      </div>
      <div class="right"><span class="chip ${d.advice.tone}">⚡ ${d.advice.text}</span></div>
    </div>
    <div class="compact-line">
      <div class="compact-kwh">☀ ${d.solarKwh.toFixed(1)} kWh</div>
      <div class="compact-time">🕒 ${d.bestWindow}</div>
    </div>`;
}

// Global lookup so the inline "Alles ↗" button can find the day data
let _allDays = [];
let _sourceLabel = '';

function renderCards(days, sourceLabel) {
  _allDays    = days;
  _sourceLabel = sourceLabel;

  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';

  days.forEach(d => {
    const card = document.createElement('section');
    // Primary cards zijn niet meer zelf klikbaar (alleen de knop erin)
    card.className = `card ${d.isPrimary ? 'primary' : 'compact'} ${(!d.isPrimary && d.tappable) ? 'tap' : ''}`;
    card.style.setProperty('--bar', toneColor(d.score));
    card.style.setProperty('--dot', toneColor(d.score));
    card.innerHTML = d.isPrimary ? primaryCardHTML(d) : compactCardHTML(d);
    // Compacte kaarten (rest van de week) blijven klikbaar voor het sheet
    if (!d.isPrimary && d.tappable) {
      card.addEventListener('click', () => openSheet(d, sourceLabel));
    }
    cardsEl.appendChild(card);
  });

  const note = document.createElement('p');
  note.className = 'source-note';
  note.innerHTML = `<span class="source-dot ${sourceLabel.includes('Elia') ? 'warn' : ''}"></span>
    Prijsbron: ${sourceLabel || '—'} · Solar: Open-Meteo`;
  cardsEl.appendChild(note);
}

function togglePrices(btn) {
  const rows = btn.closest('.price-preview').querySelector('.pp-rows');
  const open = rows.classList.toggle('open');
  btn.textContent = open ? 'Sluiten ↑' : 'Alles ↓';
}

// ════════════════════════════════════════════════════════════
// BOTTOM SHEET
// ════════════════════════════════════════════════════════════

function openSheet(day, sourceLabel) {
  document.getElementById('sheetTitle').textContent = `${day.label} • ${day.date}`;
  document.getElementById('sheetSub').textContent   = `☀ ${day.solarKwh.toFixed(1)} kWh • ${day.advice.text}`;
  document.getElementById('priceSource').textContent = `📡 ${sourceLabel}`;

  const bestHours = day.prices.filter(p => p.isBest);
  const bestMwh   = bestHours.length ? (bestHours[0].marketEurMwh ?? bestHours[0].price * 1000) : null;
  const bestLabel = bestHours.length
    ? `🕒 Beste: ${pad(bestHours[0].hour)}:00–${pad(bestHours[bestHours.length-1].hour+1)}:00  (${bestMwh.toFixed(1)} €/MWh)`
    : '🕒 —';
  document.getElementById('bestPill').textContent = bestLabel;

  const maxP = Math.max(...day.prices.map(p => p.marketEurMwh ?? p.price * 1000));
  const minP = Math.min(...day.prices.map(p => p.marketEurMwh ?? p.price * 1000));
  const range = maxP - minP || 0.001;

  const list = document.getElementById('hourList');
  list.innerHTML = '';

  day.prices.forEach(p => {
    const mwh    = p.marketEurMwh ?? (p.price * 1000);
    const tone   = priceTone(p.price, day.prices);
    const barPct = Math.round(((mwh - minP) / range) * 100);
    const row    = document.createElement('div');
    row.className = `hl-row ${p.isBest ? 'hl-best' : ''}`;
    row.innerHTML = `
      <div class="hl-time">${pad(p.hour)}:00</div>
      <div class="hl-bar-wrap">
        <div class="hl-bar" style="width:${barPct}%;background:${priceColor(tone)}"></div>
      </div>
      <div class="hl-price" style="color:${priceColor(tone)}">
        ${mwh.toFixed(1)}
        <span class="hl-unit">€/MWh</span>
      </div>`;
    list.appendChild(row);
  });

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}


// ════════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════════

document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeSheet(); });
document.getElementById('btnClose').addEventListener('click', closeSheet);
document.getElementById('btnSettings').addEventListener('click', () => {
  alert('Databronnen:\n\n☀ Solar: Open-Meteo API (gratis, Brugge)\n⚡ Prijzen: dsoubry.github.io/machinery\n        (ENTSO-E day-ahead, inclusief vaste toeslag)\n\nPrijzen zijn marktprijs + CFG.luminusToeslag (standaard €0.065/kWh).');
});
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });



// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════

function localDate(d) {
  // Geeft YYYY-MM-DD in lokale tijdzone
  return d.toLocaleDateString('nl-BE', { timeZone: CFG.tz })
    .split('/').reverse().map((v,i) => i === 0 ? v : v.padStart(2,'0')).join('-');
}

function isoDate(d) { return d.toISOString().slice(0,19); }

function priceTone(price, all) {
  const vals = all.map(x => x.price).slice().sort((a,b)=>a-b);
  const p20  = quantile(vals, 0.20);
  const p70  = quantile(vals, 0.70);
  if (price <= p20) return 'good';
  if (price >= p70) return 'bad';
  return 'mid';
}

function quantile(arr, q) {
  if (!arr.length) return 0;
  const pos  = (arr.length - 1) * q;
  const base = Math.floor(pos);
  const rest = pos - base;
  return arr[base + 1] !== undefined ? arr[base] + rest * (arr[base + 1] - arr[base]) : arr[base];
}

// ════════════════════════════════════════════════════════════
// MAIN
// ════════════════════════════════════════════════════════════

async function init() {
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = `<div class="loader"><div class="spinner"></div><div class="loader-text">Solar forecast ophalen…<br>Prijzen laden via machinery…</div></div>`;

  try {
    // Solar altijd ophalen
    // Prijzen: probeer machinery HTML-parser, val terug op Elia Open Data
    const [solarJson, machineryResult] = await Promise.all([
      fetchSolar(),
      fetchMachineryPrices(),
    ]);

    const solarDays = calcSolar(solarJson);

    let priceResult = null;
    if (machineryResult?.prices?.length) {
      priceResult = machineryResult;
    } else {
      // Fallback: Elia Open Data
      const eliaResult = await fetchEliaPrices();
      if (eliaResult?.prices?.length) {
        priceResult = eliaResult;
        priceResult.sourceLabel += machineryResult?.error
          ? ` (machinery: ${machineryResult.error})`
          : ' (machinery niet bereikbaar)';
      }
    }

    const prices      = priceResult?.prices ?? [];
    const sourceLabel = priceResult?.sourceLabel ?? 'Geen prijsdata beschikbaar';

    const days = buildDayData(solarDays, prices);
    renderCards(days, sourceLabel);

    const now = new Date();
    document.getElementById('subtitle').textContent =
      `Week • bijgewerkt ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  } catch(err) {
    cardsEl.innerHTML = `
      <div class="loader">
        <div style="font-size:24px">⚠️</div>
        <div class="loader-text" style="color:var(--bad);">Fout bij laden:<br>${err.message}</div>
        <button onclick="init()" style="margin-top:12px;padding:10px 20px;border-radius:12px;border:none;background:var(--good);color:#000;font-weight:700;cursor:pointer">Opnieuw proberen</button>
      </div>`;
  }
}

// Start + auto-refresh elk half uur
init();
setInterval(init, 30 * 60 * 1000);
</script>
